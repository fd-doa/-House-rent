<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบขอรับสิทธิและเบิกเงินค่าเช่าบ้าน</title>

    <!-- เรียกใช้ Library แค่ในไฟล์นี้ไฟล์เดียว -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --primary-blue: #1E3A8A; --secondary-blue: #3B82F6; --accent-yellow: #FBBF24; --bg-gray: #E5E7EB; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* แถบเมนูด้านซ้าย (Sidebar) */
        #sidebar {
            width: 280px; height: 100vh; position: fixed; top: 0; left: 0;
            background: linear-gradient(180deg, var(--primary-blue) 0%, #1e40af 100%);
            color: white; z-index: 1000; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        .nav-item {
            padding: 12px 20px; margin: 4px 15px; border-radius: 10px; cursor: pointer; 
            display: flex; align-items: center; gap: 15px; color: #BFDBFE; font-size: 15px; transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active { background-color: rgba(255,255,255,0.15); color: var(--accent-yellow); font-weight: bold; }
        
        /* พื้นที่ตรงกลาง ดันขอบหนีเมนู */
        #main-content { margin-left: 280px; padding: 20px; min-height: 100vh; }
        
        /* ระบบสลับหน้า */
        .page-view { display: none; }
        .page-view.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* สไตล์หน้ากระดาษ (ใช้ร่วมกันทุกฟอร์ม) */
        .paper-sheet { background: #fff; max-width: 900px; margin: 0 auto; padding: 60px 80px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 8px; color: #000; line-height: 2.2; font-size: 16px; }
        .dotted-input { border: none; border-bottom: 1.5px dotted #000; background: transparent; font-family: 'Sarabun'; text-align: center; padding: 0 5px; outline: none; }
        .dotted-input:focus { border-bottom: 1.5px solid var(--secondary-blue); }
        .hide-section { display: none !important; }
    </style>
</head>
<body>

    <!-- Sidebar เมนูหลัก -->
    <aside id="sidebar">
        <div class="p-5 text-center border-b border-blue-800">
            <div class="w-16 h-16 bg-white rounded-full mx-auto flex items-center justify-center mb-2 shadow-lg">
                <i class="fa-solid fa-house-user text-3xl text-blue-900"></i>
            </div>
            <h5 class="text-yellow-400 font-bold text-base">ระบบค่าเช่าบ้าน</h5>
        </div>
        
        <div class="mt-4 pb-10">
            <div class="text-xs text-blue-300 ml-6 mt-4 mb-2 font-bold uppercase">1. ขออนุมัติสิทธิใหม่</div>
            <!-- สังเกต onclick='switchPage(...)' นี่คือตัวที่ทำให้สลับหน้าได้ -->
            <div class="nav-item active" onclick="switchPage('page_6005', this)"><i class="fa-solid fa-file-invoice w-5"></i> ขอรับสิทธิ (6005)</div>
            <div class="nav-item" onclick="switchPage('page_committee', this)"><i class="fa-solid fa-users w-5"></i> การรับรองคณะกรรมการ</div>
            <div class="nav-item" onclick="switchPage('page_report', this)"><i class="fa-solid fa-clipboard-list w-5"></i> แบบรายงานข้อมูล</div>
            <div class="nav-item" onclick="switchPage('page_submit_request', this)"><i class="fa-solid fa-paper-plane w-5"></i> ส่งคำขออนุมัติสิทธิ</div>

            <div class="text-xs text-blue-300 ml-6 mt-6 mb-2 font-bold uppercase">2. เบิกเงินรายเดือน</div>
            <div class="nav-item" onclick="switchPage('page_6006', this)"><i class="fa-solid fa-money-check-dollar w-5"></i> ขอเบิกเงิน (6006)</div>

            <div class="text-xs text-blue-300 ml-6 mt-6 mb-2 font-bold uppercase">3. สำหรับเจ้าหน้าที่</div>
            <div class="nav-item" onclick="switchPage('page_approve', this)"><i class="fa-solid fa-clipboard-check w-5"></i> ตรวจสอบ/อนุมัติ</div>
            <div class="nav-item" onclick="switchPage('page_admin', this)"><i class="fa-solid fa-cogs w-5"></i> จัดการระบบ (Admin)</div>
        </div>
    </aside>

    <!-- พื้นที่ตรงกลาง (ดึงไฟล์ย่อยมาแสดงด้วยคำสั่ง include) -->
    <main id="main-content">
        <div id="page_6005" class="page-view active"><?!= include('form_6005'); ?></div>
        <div id="page_committee" class="page-view"><?!= include('form_committee'); ?></div>
        <div id="page_report" class="page-view"><?!= include('form_report'); ?></div>
        <div id="page_submit_request" class="page-view"><?!= include('form_submit_request'); ?></div>
        <div id="page_6006" class="page-view"><?!= include('form_6006'); ?></div>
        <div id="page_approve" class="page-view"><?!= include('report_disbursement'); ?></div>
        <div id="page_admin" class="page-view"><?!= include('admin_management'); ?></div>
    </main>

    <script>
        // ฟังก์ชันสลับหน้า โดยซ่อนหน้าที่ไม่เกี่ยวข้อง และแสดงหน้าที่กดเลือก
        function switchPage(pageId, element) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            if(element) element.classList.add('active');
            window.scrollTo(0, 0);
            
            if(typeof lucide !== 'undefined') lucide.createIcons();
        }

        // โหลดไอคอนเมื่อเปิดเว็บ
        window.onload = function() {
            if(typeof lucide !== 'undefined') lucide.createIcons();
        }
    </script>
</body>
</html>
